name: 每日考勤推送

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: 解码配置文件
        env:
          CONFIG_B64: ${{ secrets.CONFIG_YAML }}
          COOKIE_B64: ${{ secrets.YZW_COOKIES }}
        run: |
          mkdir -p configs
          echo "$CONFIG_B64" | base64 -d > config.yaml
          echo "$COOKIE_B64" | base64 -d > configs/yzw_cookies.json

      - name: 执行考勤推送
        run: python main.py --full-send
  # schedule-refresh: 2026-07-12 09:23
